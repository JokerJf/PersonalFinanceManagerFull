services:
  db:
    image: postgres:16-alpine
    container_name: pfm-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pfm}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pfm"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pfm-network

  adminer:
    image: adminer:latest
    container_name: pfm-adminer
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - pfm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=${NODE_ENV:-production}
    container_name: pfm-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-pfm}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pfm-network

  nginx:
    image: nginx:alpine
    container_name: pfm-nginx
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
      adminer:
        condition: service_started
    networks:
      - pfm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_MODE: ${APP_MODE:-production}
        USE_MOCK_DATA: ${USE_MOCK_DATA:-false}
    container_name: pfm-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_APP_MODE: ${APP_MODE:-production}
      VITE_USE_MOCK_DATA: ${USE_MOCK_DATA:-false}
    depends_on:
      - backend
    networks:
      - pfm-network

volumes:
  pg_data:

networks:
  pfm-network:
    driver: bridge
